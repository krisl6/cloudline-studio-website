                - generic [ref=e146]:
                  - paragraph [ref=e147]:
                    - strong [ref=e148]: AI adoption in Malaysia's workforce is still in its early stages.
                    - text: Most business owners have heard of AI, tried it once, and moved on. The tools are available, but the know-how, habits, and systems are not — especially outside the tech sector.
                  - paragraph [ref=e149]:
                    - strong [ref=e150]: Agencies sell campaigns, not capability.
                    - text: Most marketing and growth agencies focus on delivering ads and content. Nobody builds the internal capacity of the businesses they serve — no training, no automation, no sustainable AI habits.
                  - paragraph [ref=e151]:
                    - strong [ref=e152]: The result?
                    - text: Businesses dependent on external agencies, duplicating manual work that AI could handle in seconds, and missing the compounding ROI that comes from AI-powered operations.
