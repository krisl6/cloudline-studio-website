                    - text: Our Business Events put real products in front of real people — generating sales, feedback, and community in one afternoon. Our AI workshops teach teams to use AI in their actual work, not just in theory.
                  - paragraph [ref=e158]:
                    - strong [ref=e159]: We build the systems and the people together.
                    - text: A great AI system is only as good as the team using it. Every engagement combines system-building with education so your team can sustain and grow what we build.
                  - paragraph [ref=e160]:
