[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "18.19.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

# Removed page → closest live page (301 keeps SEO equity)
[[redirects]]
  from = "/education"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/education/*"
  to = "/services/"
  status = 301

# Legacy in-page anchors that became real routes
[[redirects]]
  from = "/#pricing"
  to = "/pricing/"
  status = 301

# NOTE: the previous catch-all `/* -> /index.html 200` (SPA fallback) was removed.
# This is a multi-page Next.js static export — each route emits its own HTML, and
# Netlify serves the generated 404.html for unknown paths. A catch-all 200 would
# cause soft-404s and hurt SEO.
